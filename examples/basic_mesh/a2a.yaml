# Basic Mesh — 2-plugin A2A demo (repeater + inverter)
version: "1.0"

runtime:
  agent_id: "basic-mesh"

models:
  base:
    provider: "huggingface"
    model_id: "demo-model"
    device: "cpu"
    dtype: "float32"

transport:
  protocol: "grpc"
  host: "0.0.0.0"
  port: 9090

plugins:
  repeater:
    enabled: true
    module: "plugins.repeater"
    class_name: "RepeaterPlugin"
    model: "base"
    priority: 10
  inverter:
    enabled: true
    module: "plugins.inverter"
    class_name: "InverterPlugin"
    model: "base"
    priority: 10

routes:
  hidden_state:
    - "inverter"
