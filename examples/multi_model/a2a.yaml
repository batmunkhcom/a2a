# Multi-Model Mesh — 3-plugin demo with cross-model projection
version: "1.0"

runtime:
  agent_id: "multi-model-mesh"

models:
  model-a:
    provider: "huggingface"
    model_id: "source-model"
    device: "cpu"
    dtype: "float32"
  model-b:
    provider: "huggingface"
    model_id: "target-model"
    device: "cpu"
    dtype: "float32"

transport:
  protocol: "grpc"
  host: "0.0.0.0"
  port: 9090

projection:
  auto_train:
    enabled: false
  architecture:
    variant: "b"
    hidden_dim: 512
    dropout: 0.1

plugins:
  summarizer:
    enabled: true
    module: "plugins.summarizer"
    class_name: "SummarizerPlugin"
    model: "model-a"
    priority: 10
  normalizer:
    enabled: true
    module: "plugins.normalizer"
    class_name: "NormalizerPlugin"
    model: "model-b"
    priority: 10
  mixer:
    enabled: true
    module: "plugins.mixer"
    class_name: "MixerPlugin"
    model: "model-b"
    priority: 10

routes:
  hidden_state:
    - "normalizer"
  mixed_state:
    - "mixer"
